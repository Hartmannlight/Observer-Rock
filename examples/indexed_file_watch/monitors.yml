monitors:
  - id: indexed-file-watch
    schedule: "*/30 * * * *"
    source:
      plugin: builtin_indexed_file
      config:
        index_path: input/index.json
        discovery_limit: 1
    change_tracking:
      recheck_recent_documents: 3
      recheck_budget_per_run: 1
      recheck_every_n_runs: 2
    analyses:
      - profile: digest_v1
    outputs:
      - profile: digest_v1
        renderer: builtin_digest
        service: local_output
